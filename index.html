<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Pecas</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  background:linear-gradient(to top,#ffe8f1,#fff8fb);
  overflow:hidden;
  font-family:'Segoe UI', sans-serif;
}

/* --- RAMO --- */
.bouquet{
  position:relative;
  width:500px;
  height:420px;
  margin-bottom:90px;
}

/* tallos */
.stem{
  position:absolute;
  width:3px;
  height:230px;
  background:linear-gradient(#2e7d32,#66bb6a);
  bottom:0;
  left:50%;
  transform-origin:bottom;
}

/* flor */
.flower{
  position:absolute;
  width:90px;
  height:90px;
}

.petal{
  position:absolute;
  width:45px;
  height:70px;
  background:radial-gradient(circle at top,#ffc1e3,#e91e63);
  border-radius:50% 50% 40% 40%;
  transform-origin:bottom center;
}

.petal:nth-child(1){ transform:rotate(0deg) translateY(-15px); }
.petal:nth-child(2){ transform:rotate(60deg) translateY(-15px); }
.petal:nth-child(3){ transform:rotate(120deg) translateY(-15px); }
.petal:nth-child(4){ transform:rotate(180deg) translateY(-15px); }
.petal:nth-child(5){ transform:rotate(240deg) translateY(-15px); }
.petal:nth-child(6){ transform:rotate(300deg) translateY(-15px); }

.center{
  position:absolute;
  width:22px;
  height:22px;
  background:#ffeb3b;
  border-radius:50%;
  top:34px;
  left:34px;
  box-shadow:0 0 10px rgba(255,235,59,0.7);
}

/* diferentes tonos */
.tone2 .petal{
  background:radial-gradient(circle at top,#ffd6ec,#ff4fa3);
}
.tone3 .petal{
  background:radial-gradient(circle at top,#ff9ecb,#d81b60);
}

/* mensaje */
.message{
  position:absolute;
  bottom:30px;
  font-size:34px;
  font-weight:300;
  color:#b30059;
  opacity:0;
  animation:fadeIn 3s ease forwards;
  animation-delay:1.5s;
  letter-spacing:2px;
}

@keyframes fadeIn{
  to{opacity:1;}
}
</style>
</head>
<body>

<div class="bouquet">

  <!-- 10 flores -->
  <!-- cada una con ligera variación de ángulo -->
  
  <!-- Generadas manualmente -->
  
  <div class="stem" style="transform:translateX(-80px) rotate(-12deg);"></div>
  <div class="flower" style="bottom:210px; left:140px;">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="stem" style="transform:translateX(-40px) rotate(-6deg);"></div>
  <div class="flower tone2" style="bottom:230px; left:190px;">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="stem" style="transform:translateX(0px) rotate(0deg);"></div>
  <div class="flower tone3" style="bottom:250px; left:230px;">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="stem" style="transform:translateX(40px) rotate(6deg);"></div>
  <div class="flower" style="bottom:230px; left:280px;">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="stem" style="transform:translateX(80px) rotate(12deg);"></div>
  <div class="flower tone2" style="bottom:210px; left:330px;">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <!-- flores laterales adicionales -->
  <div class="flower tone3" style="bottom:180px; left:110px; transform:scale(0.8);">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="flower tone2" style="bottom:170px; left:360px; transform:scale(0.8);">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="flower" style="bottom:150px; left:170px; transform:scale(0.75);">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="flower tone3" style="bottom:150px; left:300px; transform:scale(0.75);">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

  <div class="flower tone2" style="bottom:130px; left:240px; transform:scale(0.7);">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="center"></div>
  </div>

</div>

<div class="message">Te amo Pecas ❤️ Feliz Cumple Mes❤️</div>

</body>
</html>
